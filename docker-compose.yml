version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: devconnect-db
    environment:
      POSTGRES_USER: devconnect
      POSTGRES_PASSWORD: devconnect
      POSTGRES_DB: devconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devconnect-backend
    environment:
      DATABASE_URL: postgresql://devconnect:devconnect@db:5432/devconnect
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: devconnect-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  postgres_data:
