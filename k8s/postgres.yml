apiVersion: v1
kind: Namespace
metadata:
  name: devconnect
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: devconnect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: devconnect
type: Opaque
stringData:
  POSTGRES_USER: devconnect
  POSTGRES_PASSWORD: devconnect
  POSTGRES_DB: devconnect
  DATABASE_URL: postgresql://devconnect:devconnect@postgres-service:5432/devconnect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: devconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: postgres-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: devconnect
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
